<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOP100</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>TOP100</h1>
    <nav class="lists" aria-label="Song list">
      <button type="button" data-list="top100" aria-pressed="true">Top 100</button>
      <button type="button" data-list="top400" aria-pressed="false">Top 400</button>
    </nav>
    <nav class="views" aria-label="View">
      <button type="button" data-view="list" aria-pressed="true">List</button>
      <button type="button" data-view="canvas" aria-pressed="false">Canvas</button>
    </nav>
    <p id="summary">Loading…</p>
    <label class="search" id="search-wrap" hidden>
      <span class="visually-hidden">Filter songs</span>
      <input type="search" id="search" placeholder="Filter by title or artist…" autocomplete="off">
    </label>
    <ol id="songs"></ol>
  </main>

  <section id="canvas-view" hidden>
    <canvas id="field" aria-label="Cover field — drag to pan, scroll to zoom, click a cover to play"></canvas>
    <p class="hint">drag · scroll to zoom · click a cover · esc zooms out</p>
  </section>

  <aside class="player" aria-label="Global player">
    <img class="player-cover" alt="" hidden>
    <div class="player-meta" aria-live="polite">
      <div class="player-title">Pick a song</div>
      <div class="player-artist">30 second previews from DR</div>
    </div>
    <div class="player-controls">
      <button type="button" id="prev" aria-label="Previous song">⏮</button>
      <button type="button" id="play" aria-label="Play">▶</button>
      <button type="button" id="next" aria-label="Next song">⏭</button>
      <button type="button" id="shuffle" aria-pressed="false">Shuffle</button>
      <a id="youtube" class="player-youtube" href="#" target="_blank" rel="noopener noreferrer" hidden>YouTube</a>
    </div>
    <audio id="audio" preload="none"></audio>
  </aside>

  <template id="song-template">
    <li>
      <article>
        <h2></h2>
        <p class="artist"></p>
        <img alt="" width="140" height="140">
        <p class="song-actions">
          <button type="button" class="play-song">Play preview</button>
          <a class="youtube-link" href="#" target="_blank" rel="noopener noreferrer" hidden>Full track</a>
        </p>
        <p class="funfact"></p>
        <p class="credits"></p>
      </article>
    </li>
  </template>

  <script type="module" src="script.js"></script>
</body>
</html>
